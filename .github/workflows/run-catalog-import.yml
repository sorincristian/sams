name: Run Catalog Import Scripts

on:
  workflow_dispatch:
    inputs:
      database_url:
        description: "Production DATABASE_URL (PostgreSQL connection string from Render)"
        required: true
        type: string

permissions:
  contents: write   # allow the CI bot to push generated preview images back

jobs:
  import:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ github.event.inputs.database_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install poppler-utils (pdftoppm) for PDF preview generation
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends poppler-utils

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Prisma migrations
        working-directory: apps/api
        run: pnpm exec prisma migrate deploy --schema=./prisma/schema.prisma

      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm exec prisma generate --schema=./prisma/schema.prisma

      - name: Import seat catalog from spreadsheet
        working-directory: apps/api
        run: pnpm exec tsx prisma/scripts/import-seat-catalog.ts "prisma/import-data/Bus Allocation&Status-Seats.xls"

      - name: Import bus compatibility from spreadsheet
        working-directory: apps/api
        run: pnpm exec tsx prisma/scripts/import-bus-compatibility.ts "prisma/import-data/Bus Allocation&Status-Seats.xls"

      - name: Generate PDF preview images with pdftoppm
        working-directory: apps/api
        run: |
          set -e
          DIAGRAMS_DIR="diagrams"
          PREVIEWS_DIR="diagram-previews"
          mkdir -p "$PREVIEWS_DIR"

          for pdf in "$DIAGRAMS_DIR"/*.pdf; do
            [ -f "$pdf" ] || continue
            filename="$(basename "$pdf" .pdf)"
            slug="$(echo "$filename" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]\+/-/g' | sed 's/^-*//;s/-*$//')"
            outFile="${PREVIEWS_DIR}/${slug}-page1.png"

            if [ -s "$outFile" ]; then
              echo "  ↺ Exists: ${slug}-page1.png"
              continue
            fi

            echo "  Rendering: $filename -> ${slug}-page1.png"
            tmpPrefix="${PREVIEWS_DIR}/${slug}-tmp"
            pdftoppm -png -f 1 -l 1 -r 150 "$pdf" "$tmpPrefix"

            # pdftoppm creates <prefix>-01.png or <prefix>-1.png depending on version
            generated="$(ls "${tmpPrefix}"*.png 2>/dev/null | head -1)"
            if [ -n "$generated" ]; then
              mv "$generated" "$outFile"
              size=$(du -k "$outFile" | cut -f1)
              echo "  ✓ Generated: ${slug}-page1.png (${size}KB)"
            else
              echo "  ✗ pdftoppm did not produce output for: $filename"
            fi
          done

          echo ""
          echo "Preview summary:"
          ls -lh "$PREVIEWS_DIR/" || true

      - name: Commit generated preview images
        run: |
          git config user.email "ci-bot@sams.render.com"
          git config user.name "SAMS CI Bot"
          git add apps/api/diagram-previews/
          if git diff --staged --quiet; then
            echo "No new preview images — nothing to commit."
          else
            git commit -m "ci: auto-generate PDF preview images [skip ci]"
            git push
          fi

      - name: Register catalog attachments and link compatibility rows
        working-directory: apps/api
        run: pnpm exec tsx prisma/scripts/register-catalog-attachments.ts

      - name: Link manufacturer parts (PRT-BASE, BYD-BASE) to compatibility rows
        working-directory: apps/api
        run: pnpm exec tsx prisma/scripts/link-manufacturer-parts.ts
