name: Run Catalog Import Scripts

on:
  workflow_dispatch:
    inputs:
      database_url:
        description: "Production DATABASE_URL (PostgreSQL connection string from Render)"
        required: true
        type: string

jobs:
  import:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ github.event.inputs.database_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Need push permission for auto-committing generated previews
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install system dependencies for canvas + PDF rendering
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            poppler-utils \
            libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev librsvg2-dev

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Prisma migrations
        working-directory: apps/api
        run: pnpm exec prisma migrate deploy --schema=./prisma/schema.prisma

      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm exec prisma generate --schema=./prisma/schema.prisma

      - name: Import seat catalog from spreadsheet
        working-directory: apps/api
        run: pnpm exec tsx prisma/scripts/import-seat-catalog.ts "prisma/import-data/Bus Allocation&Status-Seats.xls"

      - name: Import bus compatibility from spreadsheet
        working-directory: apps/api
        run: pnpm exec tsx prisma/scripts/import-bus-compatibility.ts "prisma/import-data/Bus Allocation&Status-Seats.xls"

      - name: Generate PDF preview images
        working-directory: apps/api
        run: pnpm exec tsx prisma/scripts/generate-previews.ts

      - name: Commit generated preview images
        run: |
          git config user.email "ci-bot@sams.render.com"
          git config user.name "SAMS CI Bot"
          git add apps/api/diagram-previews/
          if git diff --staged --quiet; then
            echo "No new preview images to commit."
          else
            git commit -m "ci: auto-generate PDF preview images [skip ci]"
            git push
          fi

      - name: Register catalog attachments and link compatibility rows
        working-directory: apps/api
        run: pnpm exec tsx prisma/scripts/register-catalog-attachments.ts

      - name: Link manufacturer parts (PRT-BASE, BYD-BASE) to compatibility rows
        working-directory: apps/api
        run: pnpm exec tsx prisma/scripts/link-manufacturer-parts.ts
