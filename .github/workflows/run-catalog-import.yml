name: Run Catalog Import Scripts

on:
  workflow_dispatch:
    inputs:
      database_url:
        description: "Production DATABASE_URL (PostgreSQL connection string from Render)"
        required: true
        type: string

jobs:
  import:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ github.event.inputs.database_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Prisma migrations
        working-directory: apps/api
        run: pnpm exec prisma migrate deploy --schema=./prisma/schema.prisma

      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm exec prisma generate --schema=./prisma/schema.prisma

      - name: Import seat catalog from spreadsheet
        working-directory: apps/api
        run: pnpm exec tsx prisma/scripts/import-seat-catalog.ts "prisma/import-data/Bus Allocation&Status-Seats.xls"

      - name: Import bus compatibility from spreadsheet
        working-directory: apps/api
        run: pnpm exec tsx prisma/scripts/import-bus-compatibility.ts "prisma/import-data/Bus Allocation&Status-Seats.xls"

      - name: Register catalog attachments and link compatibility rows
        working-directory: apps/api
        run: pnpm exec tsx prisma/scripts/register-catalog-attachments.ts

      - name: Link manufacturer parts (PRT-BASE, BYD-BASE) to compatibility rows
        working-directory: apps/api
        run: pnpm exec tsx prisma/scripts/link-manufacturer-parts.ts
