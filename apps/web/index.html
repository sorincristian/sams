<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAMS</title>
    <style>
      :root { font-family: Inter, Arial, sans-serif; color: #111827; background: #f3f4f6; }
      * { box-sizing: border-box; }
      body { margin: 0; }
      a { color: inherit; text-decoration: none; }
      .shell { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
      .sidebar { background: #111827; color: #fff; padding: 24px; }
      .sidebar a { display: block; padding: 10px 12px; border-radius: 8px; margin-bottom: 6px; color: #d1d5db; }
      .sidebar a.active, .sidebar a:hover { background: #1f2937; color: #fff; }
      .content { padding: 24px; }
      .card { background: white; border-radius: 12px; padding: 18px; box-shadow: 0 1px 2px rgba(0,0,0,.08); }
      .grid { display: grid; gap: 16px; }
      .grid.stats { grid-template-columns: repeat(4, 1fr); }
      .grid.two { grid-template-columns: 1fr 1fr; }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 10px; border-bottom: 1px solid #e5e7eb; font-size: 14px; }
      h1 { margin-top: 0; }
      .login { max-width: 400px; margin: 80px auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 1px 2px rgba(0,0,0,.08); }
      input, select, textarea, button { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #d1d5db; font: inherit; }
      button { background: #111827; color: #fff; border: none; cursor: pointer; }
      .row { display: grid; gap: 12px; }
      .muted { color: #6b7280; font-size: 14px; }
      .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
      @media (max-width: 900px) {
        .shell { grid-template-columns: 1fr; }
        .grid.stats, .grid.two { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <link rel="stylesheet" href="/src/tailwind.css">
  </body>
</html>
